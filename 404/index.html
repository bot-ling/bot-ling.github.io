<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" type="image/x-icon" href="/assets/2.png">
    <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@200..900&family=Noto+Serif:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/links">Links</a></li>
            <li><a href="/credits">Credits</a></li>
            <li><a href="/privacy">Privacy Policy</a></li>
        </ul>
    </nav>

    <section id="home"></section>
    <div class="content">
        <h1>404</h1>
        <p>Oops! The page you're looking for cannot be found.</p>
    </div>

    <section style="font-size: 268px;">
        <div><p> <br> </p></div>
    </section>

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2024 LingBot. All rights reserved.</p>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/credits">Credits</a></li>
                <li><a href="/links">Links</a></li>
                <li><a href="/privacy">Privacy Policy</a></li>
            </ul>
            <ul>
                <li><a href="https://discord.gg/ybJ3BTbXt7">Support</a></li>
                <li><a href="https://discord.com/oauth2/authorize?client_id=1314623460655370241&scope=bot+applications.commands&Fguild&permissions=2113400319">Invite</a></li>
                <li><a href="https://github.com/">Source Code</a></li>
            </ul>
        </div>
    </footer>

<script>
    const circle = document.createElement('div');
    circle.id = 'mouse-circle';
    document.body.appendChild(circle);

    let isMouseMoving = false;
    let idleTimeout;

    document.addEventListener('mousemove', (e) => {
        const { clientX: x, clientY: y } = e;

        isMouseMoving = true;
        clearTimeout(idleTimeout);
        circle.style.left = `${x}px`;
        circle.style.top = `${y}px`;
        circle.style.opacity = 1;

        const trail = document.createElement('div');
        trail.className = 'trail';
        trail.style.left = `${x}px`;
        trail.style.top = `${y}px`;

        document.body.appendChild(trail);

        setTimeout(() => {
            trail.remove();
        }, 700);

        idleTimeout = setTimeout(() => {
            if (!isMouseMoving) {
                circle.style.opacity = 0;
            }
        }, 300);
    });

    document.addEventListener('mouseleave', () => {
        isMouseMoving = false;
        circle.style.opacity = 0;
    });

    document.addEventListener('mouseenter', () => {
        isMouseMoving = true;
        circle.style.opacity = 1;
    });
</script>

</body>
</html>
